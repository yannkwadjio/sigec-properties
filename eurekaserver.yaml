server:
  port: 2001
eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: false
    register-with-eureka: false
    service-url:
      defaultZone: "http://${eureka.instance.hostname}:${server.port}/eureka/"

management:
  endpoints:
    web:
      exposure:
        includes: "*"
  health:
    liveness-state:
      enabled: true
    readinsess-state:
      enabled: true
    endpoint:
      health:
        probes:
          enabled: true
   

